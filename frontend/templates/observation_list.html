{{define "observation_list"}}
{{if .}}
<ul class="observation-list">
  {{range .}}
  <li>
    <span class="kind">{{.Category}}</span>
    <span class="notes">{{.Text}}</span>
    <span class="time">{{.OccurredAt.Format "Mon 15:04"}}</span>
  </li>
  {{end}}
</ul>
{{else}}
<p class="empty">No observations logged yet.</p>
{{end}}
{{end}}
